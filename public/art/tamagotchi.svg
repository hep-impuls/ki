<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" role="img" aria-label="Illustration eines Tamagotchi (1996): ein eiförmiges Taschengerät mit kleinem Pixel-Wesen auf dem Bildschirm und drei Knöpfen.">
  <rect width="800" height="600" fill="#f1efe8"/>
  <!-- Eiform-Gehäuse -->
  <ellipse cx="400" cy="310" rx="180" ry="230" fill="#4f7a5b"/>
  <ellipse cx="400" cy="310" rx="180" ry="230" fill="none" stroke="#3a5c44" stroke-width="6"/>
  <!-- Aufhänge-Öse -->
  <path d="M400 80 q-26 -30 0 -54 q26 24 0 54" fill="none" stroke="#3a5c44" stroke-width="8"/>
  <!-- Bildschirm -->
  <rect x="300" y="180" width="200" height="170" rx="10" fill="#cdd6a8" stroke="#2f3a2a" stroke-width="5"/>
  <!-- Pixel-Wesen -->
  <g fill="#2f3a2a">
    <rect x="360" y="220" width="80" height="60" rx="6"/>
    <rect x="352" y="240" width="16" height="26"/><rect x="432" y="240" width="16" height="26"/>
    <rect x="378" y="290" width="18" height="20"/><rect x="404" y="290" width="18" height="20"/>
    <rect x="384" y="238" width="12" height="12" fill="#cdd6a8"/><rect x="404" y="238" width="12" height="12" fill="#cdd6a8"/>
  </g>
  <!-- Herz + Hunger-Anzeige -->
  <path d="M330 205 l6 -7 l6 7 l-6 8 z" fill="#b23a3a"/>
  <text x="452" y="212" fill="#2f3a2a" font-family="ui-monospace, monospace" font-size="18" font-weight="700">88</text>
  <!-- drei Knöpfe -->
  <g>
    <circle cx="330" cy="430" r="26" fill="#e7dfce" stroke="#3a5c44" stroke-width="4"/>
    <circle cx="400" cy="450" r="26" fill="#e7dfce" stroke="#3a5c44" stroke-width="4"/>
    <circle cx="470" cy="430" r="26" fill="#e7dfce" stroke="#3a5c44" stroke-width="4"/>
  </g>
</svg>
