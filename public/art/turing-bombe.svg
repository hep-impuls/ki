<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Illustration einer Code-Knack-Maschine im Stil von Turings Bombe: ein Schrank mit Reihen drehbarer Rotoren und einem Lochstreifen mit entschlüsseltem Text.">
  <rect width="800" height="600" fill="#eceae3"/>
  <!-- Maschinenschrank -->
  <rect x="120" y="90" width="470" height="410" rx="10" fill="#3c4650"/>
  <rect x="120" y="90" width="470" height="410" rx="10" fill="none" stroke="#2a323a" stroke-width="4"/>
  <!-- drei Reihen Rotoren/Trommeln -->
  <g>
    <!-- Reihenhintergrund -->
    <rect x="145" y="120" width="420" height="105" rx="6" fill="#2f373f"/>
    <rect x="145" y="245" width="420" height="105" rx="6" fill="#2f373f"/>
    <rect x="145" y="370" width="420" height="105" rx="6" fill="#2f373f"/>
  </g>
  <g stroke="#1f262c" stroke-width="2">
    <!-- 3 Reihen x 6 Trommeln -->
    <g fill="#b26a3b">
      <circle cx="185" cy="172" r="34"/><circle cx="258" cy="172" r="34"/><circle cx="331" cy="172" r="34"/>
      <circle cx="404" cy="172" r="34"/><circle cx="477" cy="172" r="34"/><circle cx="540" cy="172" r="30"/>
    </g>
    <g fill="#4f7a5b">
      <circle cx="185" cy="297" r="34"/><circle cx="258" cy="297" r="34"/><circle cx="331" cy="297" r="34"/>
      <circle cx="404" cy="297" r="34"/><circle cx="477" cy="297" r="34"/><circle cx="540" cy="297" r="30"/>
    </g>
    <g fill="#4b6b86">
      <circle cx="185" cy="422" r="34"/><circle cx="258" cy="422" r="34"/><circle cx="331" cy="422" r="34"/>
      <circle cx="404" cy="422" r="34"/><circle cx="477" cy="422" r="34"/><circle cx="540" cy="422" r="30"/>
    </g>
  </g>
  <!-- Trommel-Innenringe + Markierung (Rotation) -->
  <g fill="none" stroke="#efe7d8" stroke-width="2" opacity="0.85">
    <circle cx="185" cy="172" r="18"/><circle cx="258" cy="172" r="18"/><circle cx="331" cy="172" r="18"/><circle cx="404" cy="172" r="18"/><circle cx="477" cy="172" r="18"/>
    <circle cx="185" cy="297" r="18"/><circle cx="258" cy="297" r="18"/><circle cx="331" cy="297" r="18"/><circle cx="404" cy="297" r="18"/><circle cx="477" cy="297" r="18"/>
    <circle cx="185" cy="422" r="18"/><circle cx="258" cy="422" r="18"/><circle cx="331" cy="422" r="18"/><circle cx="404" cy="422" r="18"/><circle cx="477" cy="422" r="18"/>
  </g>
  <g stroke="#efe7d8" stroke-width="2" stroke-linecap="round">
    <path d="M185 172 l0 -30"/><path d="M258 172 l20 -20"/><path d="M331 172 l0 -30"/><path d="M404 172 l-20 -20"/><path d="M477 172 l14 -26"/>
    <path d="M185 297 l18 -22"/><path d="M258 297 l0 -30"/><path d="M331 297 l-18 -22"/><path d="M404 297 l0 -30"/><path d="M477 297 l22 -18"/>
    <path d="M185 422 l0 -30"/><path d="M258 422 l-20 -20"/><path d="M331 422 l20 -20"/><path d="M404 422 l0 -30"/><path d="M477 422 l-14 -26"/>
  </g>
  <!-- Kabel hinten -->
  <g fill="none" stroke="#7d5b34" stroke-width="4" opacity="0.8">
    <path d="M590 160 C 660 170, 660 220, 600 235"/>
    <path d="M590 300 C 670 300, 670 340, 600 360"/>
    <path d="M590 430 C 660 430, 660 470, 600 470"/>
  </g>
  <!-- Lochstreifen mit entschlüsseltem Text -->
  <g>
    <rect x="600" y="250" width="150" height="230" rx="6" fill="#f2ead9" stroke="#c9bb99" stroke-width="2"/>
    <g fill="#33302a" font-family="ui-monospace, monospace" font-size="19" font-weight="700" letter-spacing="2">
      <text x="620" y="290">WE</text>
      <text x="620" y="322">TT</text>
      <text x="620" y="354">ER</text>
      <text x="620" y="386">BE</text>
      <text x="620" y="418">RI</text>
      <text x="620" y="450">CHT</text>
    </g>
    <!-- Lochung am Rand -->
    <g fill="#c9bb99"><circle cx="612" cy="270" r="3"/><circle cx="612" cy="300" r="3"/><circle cx="612" cy="330" r="3"/><circle cx="612" cy="360" r="3"/><circle cx="612" cy="390" r="3"/><circle cx="612" cy="420" r="3"/><circle cx="612" cy="450" r="3"/></g>
  </g>
</svg>
