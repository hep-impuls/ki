<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Illustration einer Anden-Knotenschnur (Quipu): eine Hauptschnur mit herabhängenden, geknoteten Nebenschnüren.">
  <rect width="800" height="600" fill="#f2efe6"/>
  <!-- Hauptschnur -->
  <path d="M70 150 C 250 120, 550 120, 730 150" fill="none" stroke="#8a6a3f" stroke-width="9" stroke-linecap="round"/>
  <circle cx="70" cy="150" r="9" fill="#6f5230"/>
  <circle cx="730" cy="150" r="9" fill="#6f5230"/>
  <!-- Nebenschnüre (Pendants) mit Knoten -->
  <g stroke-linecap="round" fill="none">
    <!-- 1 -->
    <path d="M150 138 C 140 260, 158 380, 150 470" stroke="#a9814f" stroke-width="5"/>
    <!-- 2 -->
    <path d="M255 128 C 268 230, 250 360, 262 520" stroke="#4f7a5b" stroke-width="5"/>
    <!-- 3 -->
    <path d="M360 124 C 350 240, 366 400, 356 430" stroke="#b5603a" stroke-width="5"/>
    <!-- 4 (Untergruppe hängt an 3) -->
    <path d="M356 430 C 400 470, 430 500, 470 500" stroke="#b5603a" stroke-width="4"/>
    <!-- 5 -->
    <path d="M470 124 C 482 250, 466 380, 476 560" stroke="#4b6b86" stroke-width="5"/>
    <!-- 6 -->
    <path d="M575 128 C 566 240, 580 360, 572 460" stroke="#a9814f" stroke-width="5"/>
    <!-- 7 -->
    <path d="M660 138 C 672 230, 656 340, 666 500" stroke="#4f7a5b" stroke-width="5"/>
  </g>
  <!-- Knoten (Zahlen) -->
  <g fill="#5e4326">
    <ellipse cx="149" cy="210" rx="9" ry="12"/>
    <ellipse cx="152" cy="300" rx="9" ry="12"/>
    <ellipse cx="150" cy="330" rx="9" ry="12"/>
    <ellipse cx="258" cy="250" rx="9" ry="12" fill="#2f5a3d"/>
    <ellipse cx="256" cy="410" rx="9" ry="12" fill="#2f5a3d"/>
    <ellipse cx="357" cy="210" rx="9" ry="12" fill="#7c3f22"/>
    <ellipse cx="447" cy="498" rx="8" ry="11" fill="#7c3f22"/>
    <ellipse cx="474" cy="230" rx="9" ry="12" fill="#33506a"/>
    <ellipse cx="470" cy="270" rx="9" ry="12" fill="#33506a"/>
    <ellipse cx="472" cy="310" rx="9" ry="12" fill="#33506a"/>
    <ellipse cx="571" cy="300" rx="9" ry="12"/>
    <ellipse cx="664" cy="260" rx="9" ry="12" fill="#2f5a3d"/>
    <ellipse cx="662" cy="360" rx="9" ry="12" fill="#2f5a3d"/>
  </g>
  <!-- Aufhängung -->
  <path d="M400 118 l0 -34" stroke="#6f5230" stroke-width="4" stroke-linecap="round"/>
  <circle cx="400" cy="80" r="7" fill="#6f5230"/>
</svg>
