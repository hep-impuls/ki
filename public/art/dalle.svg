<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" role="img" aria-label="Illustration von DALL·E (2021): aus einem geschriebenen Satz entsteht ein neues Bild — hier ein Sessel in Form einer Avocado.">
  <rect width="800" height="600" fill="#eeece5"/>
  <!-- Prompt-Feld links -->
  <rect x="60" y="230" width="300" height="140" rx="14" fill="#f6f2e8" stroke="#c9bb99" stroke-width="3"/>
  <text x="82" y="270" fill="#7a7264" font-family="ui-sans-serif, sans-serif" font-size="16" font-style="italic">Deine Worte</text>
  <g font-family="ui-sans-serif, sans-serif" font-size="20" font-weight="600" fill="#33302a">
    <text x="82" y="305">«ein Sessel in</text>
    <text x="82" y="333">Form einer</text>
    <text x="82" y="361">Avocado»</text>
  </g>
  <!-- Pfeil -->
  <g stroke="#b26a3b" stroke-width="6" fill="none" stroke-linecap="round">
    <path d="M372 300 L 452 300"/>
  </g>
  <path d="M452 300 l-18 -11 l0 22 z" fill="#b26a3b"/>
  <text x="372" y="285" fill="#b26a3b" font-family="ui-sans-serif, sans-serif" font-size="15" font-weight="700">KI malt</text>
  <!-- Bildrahmen rechts -->
  <rect x="470" y="150" width="270" height="300" rx="10" fill="#ffffff" stroke="#5b5347" stroke-width="4"/>
  <rect x="470" y="150" width="270" height="300" rx="10" fill="#f3ede0"/>
  <rect x="470" y="150" width="270" height="300" rx="10" fill="none" stroke="#5b5347" stroke-width="4"/>
  <!-- Avocado-Sessel -->
  <g>
    <!-- Sessel-Rückenlehne als Avocado-Hälfte -->
    <path d="M545 210 q60 -55 120 0 q22 90 -10 150 l-100 0 q-32 -60 -10 -150 z" fill="#5f8a3a"/>
    <path d="M545 210 q60 -55 120 0 q22 90 -10 150 l-100 0 q-32 -60 -10 -150 z" fill="none" stroke="#3f5f27" stroke-width="4"/>
    <!-- Fruchtfleisch / Sitzfläche -->
    <ellipse cx="605" cy="300" rx="62" ry="70" fill="#d7d08a"/>
    <!-- Kern als Sitzkissen -->
    <circle cx="605" cy="315" r="30" fill="#8a5a2c"/>
    <!-- Armlehnen -->
    <rect x="533" y="300" width="26" height="70" rx="10" fill="#5f8a3a"/>
    <rect x="651" y="300" width="26" height="70" rx="10" fill="#5f8a3a"/>
    <!-- Beine -->
    <rect x="548" y="368" width="14" height="40" fill="#4b3a24"/>
    <rect x="648" y="368" width="14" height="40" fill="#4b3a24"/>
  </g>
  <!-- Datums-Badge -->
  <rect x="470" y="470" width="200" height="46" rx="23" fill="#33302a"/>
  <text x="492" y="500" fill="#f2ead9" font-family="ui-sans-serif, sans-serif" font-size="20" font-weight="700">Januar 2021</text>
</svg>
